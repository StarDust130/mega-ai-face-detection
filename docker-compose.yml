services:
  db:
    image: postgres:15-alpine
    container_name: mega-ai-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dbname"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: mega-ai-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/dbname
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: mega-ai-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/video
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
